# XcodeGen spec — the Xcode project is generated from this file so it stays diffable.
# Regenerate after editing:  cd app && xcodegen generate
#
# Bundle id / display name / platform come from docs/contracts/shared-constants.md.
name: VisionSpots
options:
  bundleIdPrefix: org.richardmch
  deploymentTarget:
    visionOS: "2.0"
  createIntermediateGroups: true
  groupSortPosition: top
  # Pin the project file format so the installed Xcode can open it (XcodeGen otherwise
  # defaults to a newer objectVersion than Xcode 16.0 supports).
  objectVersion: 56

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    # apple-signing fills DEVELOPMENT_TEAM in app/Signing.xcconfig once it exists.
    # Until then the app still builds & runs in the visionOS Simulator (no signing needed).
    CODE_SIGN_STYLE: Automatic

configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig

targets:
  VisionSpots:
    type: application
    platform: visionOS
    sources:
      - path: Sources
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.richardmch.visionspots
        PRODUCT_NAME: vision-spots
        INFOPLIST_FILE: Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "7"   # 7 = Apple Vision
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
